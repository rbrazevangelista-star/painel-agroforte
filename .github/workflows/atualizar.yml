name: Atualizar painel CEPEA

on:
  schedule:
    # 09:30 BRT (12:30 UTC) em dias úteis — após o fechamento do dia anterior.
    - cron: "30 12 * * 1-5"
  workflow_dispatch:        # permite rodar manualmente pelo botão "Run workflow"

permissions:
  contents: write           # necessário para commitar o dados.json atualizado

jobs:
  atualizar:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install -r requirements.txt

      - name: Rodar atualização
        run: python atualizar_cepea.py

      - name: Commitar se mudou
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dados.json
          git diff --staged --quiet || git commit -m "chore: atualiza dados CEPEA ($(date +%F))"
          git push
